name: Documentation Check

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check README exists
        run: test -f README.md && echo "README.md OK" || exit 1

      - name: Check CHANGELOG exists
        run: test -f CHANGELOG.md && echo "CHANGELOG.md OK" || exit 1

      - name: Check LICENSE exists
        run: test -f LICENSE && echo "LICENSE OK" || exit 1

      - name: Check docs directory
        run: |
          test -d docs && echo "docs/ OK" || exit 1
          DOC_COUNT=$(find docs -name "*.md" | wc -l)
          echo "$DOC_COUNT documentation files found"
          test "$DOC_COUNT" -ge 5 && echo "Sufficient documentation" || echo "Warning: less than 5 doc files"

      - name: Check Javadoc coverage
        run: |
          TOTAL=$(find src -name "*.java" | wc -l)
          WITH_JAVADOC=$(grep -rl "^\s*/\*\*" src --include="*.java" | wc -l)
          echo "Javadoc coverage: $WITH_JAVADOC / $TOTAL files"
